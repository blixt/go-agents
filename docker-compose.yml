services:
  agentd:
    build:
      context: ..
      dockerfile: go-agents/Dockerfile
    working_dir: /app/go-agents
    command: ["agentd"]
    volumes:
      - go_agents_home:/root/.go-agents
    env_file:
      - .env

  web:
    build:
      context: ..
      dockerfile: go-agents/Dockerfile
    working_dir: /app/go-agents/web
    command: ["bun", "run", "start"]
    ports:
      - "8080:8080"
    environment:
      GO_AGENTS_UI_API_BASE: "http://agentd:8080"
      GO_AGENTS_UI_ADDR: ":8080"
    depends_on:
      - agentd
    env_file:
      - .env

  execd:
    build:
      context: ..
      dockerfile: go-agents/Dockerfile
    working_dir: /app/go-agents
    command: ["bun", "/app/go-agents/exec/execd.ts", "--api-url", "http://agentd:8080", "--parallel", "2"]
    volumes:
      - go_agents_home:/root/.go-agents
    depends_on:
      - agentd
    env_file:
      - .env

volumes:
  go_agents_home:
